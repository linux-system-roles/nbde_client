---
- name: Include general tests variables
  include_vars: main.yml

- name: Ensure Ansible facts required by tests
  setup:
    gather_subset: min
  when: not ansible_facts.keys() | list |
    intersect(__test_required_facts) == __test_required_facts
  vars:
    __test_required_facts:
      - distribution
      - distribution_major_version
      - distribution_version
      - os_family

- name: Set version specific variables
  include_vars: "{{ lookup('first_found', ffparams) }}"
  vars:
    ffparams:
      files:
        - "{{ ansible_facts['distribution'] }}_\
          {{ ansible_facts['distribution_version'] }}.yml"
        - "{{ ansible_facts['distribution'] }}_\
          {{ ansible_facts['distribution_major_version'] }}.yml"
        - "{{ ansible_facts['distribution'] }}.yml"
        - "{{ ansible_facts['os_family'] }}.yml"
        - "default.yml"
      paths:
        - "{{ playbook_dir }}/vars"

- name: Print all available facts
  debug:
    var: ansible_facts

- name: Install required packages for nbde_client tests
  package:
    name: "{{ nbde_client_test_packages }}"

- name: Create temp dir for test on controller
  tempfile:
    state: directory
    prefix: lsr_nbde_client_
  register: __nbde_client_tmp_dir_local
  changed_when: false
  delegate_to: localhost

- name: Set nbde_client_test_encryption_key_src, dest, roles dir
  set_fact:
    nbde_client_test_encryption_key_src: >-
      {{ __nbde_client_tmp_dir_local.path }}/encryption_key
    nbde_client_test_encryption_key_dest: >-
      /tmp/encryption_key

- name: Deploy NBDE server for testing
  include_role:
    name: fedora.linux_system_roles.nbde_server
  when: hostvars.keys() | list | length == 1

- name: Create device for testing
  command: fallocate -l64m {{ nbde_client_test_device }}
  changed_when: false

- name: Create LUKS1 device for testing
  command: fallocate -l64m {{ nbde_client_test_device_luks1 }}
  changed_when: false

- name: Format test device as LUKS (LUKS2 with modern cryptsetup)
  shell: >-
    set -euo pipefail;
    echo -n {{ nbde_client_test_pass }} |
    cryptsetup luksFormat --pbkdf pbkdf2 --pbkdf-force-iterations 1000
    --batch-mode --force-password {{ nbde_client_test_device }}
  changed_when: false

- name: Format another test device as LUKS1
  shell: >-
    set -euo pipefail;
    echo -n {{ nbde_client_test_pass }} |
    cryptsetup luksFormat --type luks1 --pbkdf-force-iterations 1000
    --batch-mode --force-password {{ nbde_client_test_device_luks1 }}
  changed_when: false

- name: Create key file for test device
  copy:
    content: "{{ nbde_client_test_pass }}"
    dest: "{{ nbde_client_test_encryption_key_src }}"
    mode: preserve
  delegate_to: localhost
  changed_when: false

- name: Setup for separate NBDE server host
  when: hostvars.keys() | list | length > 1
  block:
    - name: Get unused disk for testing
      fedora.linux_system_roles.find_unused_disk:
        max_return: 1
      register: __register_unused_disk

    - name: Set nbde_client test variables - 1
      set_fact:
        nbde_client_test_device: "/dev/{{ __register_unused_disk.disks[0] }}"
        nbde_client_test_mount_location: "/mnt/nbde_client_test"
        nbde_client_test_encryption_password: nbde_client_test_passphrase
        nbde_client_test_encryption_luks_version: luks2
        nbde_client_test_file_contents: This is a test file for nbde_client tests

    - name: Set nbde_client test variables - 2
      set_fact:
        nbde_client_test_file: "{{ nbde_client_test_mount_location }}/test.txt"

    - name: Encrypt test disk
      include_role:
        name: fedora.linux_system_roles.storage
      vars:
        storage_volumes:
          - name: nbde_client_volume
            type: disk
            disks: "{{ __register_unused_disk.disks }}"
            mount_point: "{{ nbde_client_test_mount_location }}"
            encryption: true
            encryption_password: "{{ nbde_client_test_encryption_password }}"
            encryption_luks_version: "{{ nbde_client_test_encryption_luks_version }}"

    - name: Create test file
      copy:
        content: "{{ nbde_client_test_file_contents }}"
        dest: "{{ nbde_client_test_file }}"
        mode: "0644"

    - name: Check that volume is setup for luks
      command: cryptsetup luksDump {{ nbde_client_test_device }}
      changed_when: false
